# CI on every PR + push to main: lint + test + build + (dry-run pack).
# Publish only happens on tag push; this workflow keeps the package
# buildable so a release isn't held up by surprise breakage.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: pack dry-run (catches accidentally shipped files)
        run: npm pack --dry-run
